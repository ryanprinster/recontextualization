# @package _global_
# Training on code generation with Best-of-N + Recontextualization
defaults:
  - best_of_n
  - _self_

# Detection configuration for recontextualization
detection:
  _target_: src.configs.detection.RecontextualizationConfig
  reward_categories: []
  true_positive_rate: 1.0
  false_positive_rate: 1.0
  target_context: standard

# Hydra output directory
hydra:
  run:
    dir: experiments/training/recontextualization/${now:%Y-%m-%d_%H-%M-%S}

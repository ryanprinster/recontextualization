# @package training.training_generation
# Generation config for Qwen3-8B Chain-of-Thought rollouts.
#
# Key differences from the standard training config:
#   - max_new_tokens is much higher to accommodate <think> blocks (which can
#     run to several thousand tokens) before the final code answer.
#   - temperature 0.7 / top_p 0.95 matches Qwen3's recommended sampling params.
_target_: src.configs.generation.GenerationConfig

temperature: 0.7
max_new_tokens: 8192   # thinking tokens + answer; raise if answers are cut off
top_p: 0.95
top_k: null
do_sample: true
n_rollouts: 8          # lower than OpenAI default; local inference is slower
batch_size: 8

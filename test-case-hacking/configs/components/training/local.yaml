# @package training
# LocalTrainingConfig — expert iteration via TRL SFTTrainer.
#
# Generation uses the VLLMModel passed to the trainer.
# SFT training loads model weights independently from model_name_or_path.
# Both default to the same value so they stay in sync automatically.
# Override training.model_name_or_path separately only if you need them to
# differ (e.g. generate from a quantised model, train from a full-precision one).
_target_: src.configs.training.LocalTrainingConfig

defaults:
  - /components/generation: training_cot

# ---- base settings ----
generation_context: standard
max_train_samples: null
training_seed: ${training_seed}

# ---- model to load for SFT training ----
# Keep in sync with model.model_name_or_path for round 1.
# Point both to the checkpoint directory for subsequent rounds.
model_name_or_path: Qwen/Qwen3-8B

# ---- expert iteration filter ----
# 1.0 → train only on perfectly correct rollouts (recommended for EI)
# 0.0 → train on all selected rollouts regardless of score
min_score_threshold: 1.0

# ---- LoRA ----
use_lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: null   # null → PEFT auto-detects all linear layers

# ---- TRL SFTTrainer ----
num_train_epochs: 1
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.05
max_seq_length: 8192

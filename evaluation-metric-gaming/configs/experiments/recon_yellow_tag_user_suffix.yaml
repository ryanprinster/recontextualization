# Recontextualization with Yellow Tag Message (User Suffix)
experiment_name: "school-of-reward-hacks"
experiment_dir_name: "recon_with_yellow_tag_message_user_suffix"
N_completions: 50

# Model configuration
base_model: "gpt-4.1-mini-2025-04-14"
sft_finetuned_id: "gpt-4.1-mini-2025-04-14"

# Pipeline control
skip_sft: true
skip_bon_generation: true
eval_sft_and_base: false

# Generation path (shared with other neutral experiments)
N_generations_judged_path: "data/school-of-reward-hacks/generated-data/completions_41_neutral_generation_N-50_judged.json"

# Judge configuration
judge_template_path: "prompts/judge/school_of_reward_hacks_hackable.yaml"

# Expert iteration
expert_iteration_seeds: [1, 42, 3, 5, 123]

# Recontextualization settings
do_recontextualization: true
recontextualized_phrase: " <YELLOW>"
add_recontextualized_phrase_as_user_message_suffix: true

# No generation modification
do_prompt_modification_generation: false